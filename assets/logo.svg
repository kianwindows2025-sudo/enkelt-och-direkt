<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Enkelt och Direkt">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8ef7"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#173e8f"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle med djup blå gradient -->
  <path d="M32 2c22.5 0 30 7.5 30 30s-7.5 30-30 30S2 54.5 2 32 9.5 2 32 2Z" fill="url(#bg)"/>
  <!-- Mjuk toppglans för djup -->
  <path d="M32 2c22.5 0 30 7.5 30 30 0 1.5 0 3-.1 4.4C57 22 45 16 32 16S7 22 2.1 36.4C2 35 2 33.5 2 32 2 9.5 9.5 2 32 2Z" fill="url(#shine)"/>

  <!-- Nyhetsrader i fallande rörelse framåt; mitten blir en pil = "Direkt" -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <line x1="16" y1="21" x2="36" y2="21" stroke-width="6" opacity="0.55"/>
    <line x1="16" y1="32" x2="43" y2="32" stroke-width="6.5"/>
    <polyline points="37.5,24 45.5,32 37.5,40" stroke-width="6.5" stroke-linejoin="round"/>
    <line x1="16" y1="43" x2="30" y2="43" stroke-width="6" opacity="0.55"/>
  </g>
</svg>
